<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raftaar Racing</title>
  <meta name="description" content="Raftaar Racing — F1 in Schools team." />
  <link rel="icon" href="images/logo.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <noscript>
    <div class="noscript">This website needs JavaScript turned on to show its
    pictures and words. Please enable JavaScript in your browser.</div>
  </noscript>

  <nav>
    <a class="logo-container" href="#home">
      <img class="logo-img" id="nav-logo" src="images/logo.jpg" alt="logo" />
      <span class="logo-text" id="nav-team-name"></span>
    </a>
    <div class="nav-links">
      <a href="#home">Home</a>
      <a href="#about">About</a>
      <a href="#car">The Car</a>
      <a href="#team">Team</a>
      <a href="#gallery">Gallery</a>
    </div>
    <a class="contact-btn" id="nav-contact" href="#">Contact</a>
  </nav>

  <header id="home" class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="hero-eyebrow" id="hero-eyebrow"></div>
      <h1 class="hero-title" id="hero-title"></h1>
      <p class="hero-tagline" id="hero-tagline"></p>
      <div class="hero-buttons" id="hero-buttons"></div>
    </div>
    <img class="hero-car-img" id="hero-car" src="images/hero-car.jpg" alt="Our car" />
  </header>

  <div class="stats-bar" id="stats-bar"></div>

  <section id="about" class="about reveal">
    <div class="about-text" id="about-text"></div>
    <div class="about-image">
      <img id="about-img" src="images/about-team.jpg" alt="Our team" />
      <div class="image-overlay"></div>
    </div>
  </section>

  <section id="car" class="car-specs">
    <div class="specs-container">
      <div class="reveal" id="car-text"></div>
      <div class="reveal car-image-wrap">
        <img id="car-img" src="images/car.jpg" alt="Our car" />
      </div>
    </div>
  </section>

  <section id="team" class="team">
    <div class="section-header reveal">
      <div class="hero-eyebrow">The Brains</div>
      <h2>MEET THE <span>CREW.</span></h2>
    </div>
    <div class="team-grid" id="team-grid"></div>
  </section>

  <section id="gallery" class="gallery">
    <div class="section-header reveal">
      <div class="hero-eyebrow">Moments</div>
      <h2>GALLERY</h2>
    </div>
    <div class="gallery-grid" id="gallery-grid"></div>
  </section>

  <footer>
    <div class="footer-logo">
      <img class="logo-img" id="footer-logo" src="images/logo.jpg" alt="logo" />
      <span class="logo-text" id="footer-team-name"></span>
    </div>
    <div class="social-links" id="social-links"></div>
    <p class="copyright" id="copyright"></p>
  </footer>

  <script src="assets/marked.min.js"></script>
  <script src="assets/site.js"></script>
</body>
</html>
